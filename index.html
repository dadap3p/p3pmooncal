<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Persona3 Style Lunar Calendar</title>
<style>
  :root{
    --bg:#0b0f14;
    --panel:#0f1720;
    --accent:#1e90ff;
    --muted:#9aa6b2;
    --white:#ffffff;
    --glass: rgba(255,255,255,0.04);
    --circle-size:64px;
    --gap:18px;
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }
  html,body{height:100%;margin:0;background:linear-gradient(180deg,#07101a 0%, #07131a 100%);color:var(--white);}
  .wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
    box-sizing:border-box;
  }

  /* Card */
  .card{
    width:920px;
    max-width:95vw;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:14px;
    padding:28px;
    box-shadow: 0 10px 30px rgba(2,6,12,0.6);
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.03);
  }

  /* Top-right Japanese title */
  .title-jp{
    position:absolute;
    right:22px;
    top:18px;
    color:var(--muted);
    font-size:12px;
    letter-spacing:1px;
    text-transform:none;
  }

  /* Diagonal week strip container */
  .week-wrap{
    position:relative;
    height:160px;
    margin-top:12px;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    transform:skewY(-6deg);
    transform-origin:left center;
    gap:var(--gap);
    padding-left:36px;
  }

  /* Blue stripe for selected day */
  .selected-strip{
    position:absolute;
    left:50%;
    top:36px;
    transform:translateX(-50%) skewY(-6deg);
    width:420px;
    height:88px;
    background:linear-gradient(90deg,var(--accent), #2aa0ff 60%);
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1;
    box-shadow: 0 8px 20px rgba(30,144,255,0.18);
  }
  .selected-strip .big-date{
    font-size:56px;
    font-weight:700;
    color:var(--white);
    margin-right:18px;
    letter-spacing:1px;
  }
  .selected-strip .status{
    color:rgba(255,255,255,0.95);
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  /* Day item */
  .day{
    width:var(--circle-size);
    height:var(--circle-size);
    min-width:var(--circle-size);
    border-radius:50%;
    background:var(--glass);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:2;
    cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.45);
    border:1px solid rgba(255,255,255,0.03);
  }
  .day:hover{ transform:translateY(-6px) scale(1.03); box-shadow: 0 12px 30px rgba(0,0,0,0.6); }
  .day .weekday{ font-size:11px; color:var(--muted); margin-bottom:6px; transform:skewY(6deg); }
  .day .date{ font-size:16px; font-weight:700; color:var(--white); transform:skewY(6deg); }
  .day .moon{ margin-top:6px; width:18px; height:18px; transform:skewY(6deg); }

  /* Selected day style (circle) */
  .day.selected{
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    box-shadow: 0 14px 40px rgba(30,144,255,0.12);
    border:1px solid rgba(255,255,255,0.08);
    transform:translateY(-12px) scale(1.06);
  }

  /* Weekday labels below the strip (non-skewed) */
  .week-labels{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:calc(var(--gap) + 8px);
    transform:skewY(0deg);
  }
  .week-labels .label{ width:var(--circle-size); text-align:center; color:var(--muted); font-size:12px; }

  /* Controls */
  .controls{
    display:flex;
    gap:12px;
    position:absolute;
    left:22px;
    top:18px;
  }
  .btn{
    background:transparent;
    border:1px solid rgba(255,255,255,0.04);
    color:var(--muted);
    padding:8px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
  }
  .btn:active{ transform:translateY(1px); }

  /* Footer small info */
  .meta{
    margin-top:22px;
    color:var(--muted);
    font-size:13px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  /* Responsive */
  @media (max-width:720px){
    .card{ padding:18px; }
    .selected-strip{ width:320px; height:76px; top:28px; }
    .selected-strip .big-date{ font-size:44px; }
    :root{ --circle-size:56px; --gap:12px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card" role="application" aria-label="Persona style weekly calendar">
    <div class="controls" aria-hidden="true">
      <button class="btn" id="prevWeek">&larr;</button>
      <button class="btn" id="nextWeek">&rarr;</button>
    </div>

    <div class="title-jp">ペルソナ3 リロード デイリーライフトレーラー</div>

    <div class="week-wrap" id="weekWrap" aria-live="polite">
      <!-- Selected blue strip -->
      <div class="selected-strip" id="selectedStrip" aria-hidden="true">
        <div class="big-date" id="bigDate">7</div>
        <div class="status" id="statusText">休日 | Day off</div>
      </div>

      <!-- Day items inserted by JS -->
    </div>

    <div class="week-labels" id="weekLabels" aria-hidden="true"></div>

    <div class="meta">
      <div>Week view</div>
      <div id="todayInfo">Today: —</div>
    </div>
  </div>
</div>

<script>
/*
  Persona3-style weekly calendar
  - Generates a 7-day week starting from startDate
  - Highlights selected day and shows big date + status
  - Computes a simple lunar phase for each day and draws a small SVG moon
  - Keyboard navigation: left/right to move selection
*/

(function(){
  // Configuration: change startDate to set the week shown
  let startDate = new Date(); // default: today
  // Example: to show July 2, 2009 as in the image, uncomment:
  // startDate = new Date(2009, 6, 2); // months are 0-indexed (6 = July)

  const weekWrap = document.getElementById('weekWrap');
  const weekLabels = document.getElementById('weekLabels');
  const bigDate = document.getElementById('bigDate');
  const statusText = document.getElementById('statusText');
  const todayInfo = document.getElementById('todayInfo');

  const weekdaysJP = ['日','月','火','水','木','金','土'];
  const weekdaysEN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let selectedIndex = 4; // default selected day index (0..6) to mimic center highlight

  function cloneDate(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

  function addDays(d, n){
    const x = cloneDate(d);
    x.setDate(x.getDate() + n);
    return x;
  }

  function formatDate(d){ return d.getDate(); }

  // Simple lunar phase calculation (approximate)
  // Returns 0..1 where 0 = new moon, 0.5 = full moon
  function lunarPhaseFraction(date){
    // Algorithm: Conway's method approximation
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    const day = date.getDate();
    let r = year % 100;
    r %= 19;
    if (r > 9) r -= 19;
    let k = ((r * 11) % 30) + month + day;
    if (month < 3) k += 2;
    k -= (year < 2000) ? 4 : 8.3;
    k = (k + 30) % 30;
    return k / 30; // 0..1
  }

  function moonSVG(fraction){
    // fraction 0..1
    // We'll draw a circle and mask to show phase
    const phase = fraction;
    const tilt = 0; // no tilt for simplicity
    // Create an SVG string
    const svg = `
      <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <mask id="m">
            <rect x="0" y="0" width="24" height="24" fill="white"/>
            <circle cx="${12 + (phase-0.5)*18}" cy="12" r="9" fill="black"/>
          </mask>
        </defs>
        <circle cx="12" cy="12" r="9" fill="rgba(255,255,255,0.95)"/>
        <g mask="url(#m)">
          <circle cx="12" cy="12" r="9" fill="rgba(11,17,24,0.95)"/>
        </g>
      </svg>`;
    return svg;
  }

  function buildWeek(){
    weekWrap.querySelectorAll('.day').forEach(n=>n.remove());
    weekLabels.innerHTML = '';

    for(let i=0;i<7;i++){
      const d = addDays(startDate, i);
      const dayEl = document.createElement('div');
      dayEl.className = 'day';
      dayEl.setAttribute('tabindex','0');
      dayEl.dataset.index = i;
      dayEl.dataset.date = d.toISOString();

      const weekday = document.createElement('div');
      weekday.className = 'weekday';
      weekday.textContent = weekdaysEN[d.getDay()];

      const dateNum = document.createElement('div');
      dateNum.className = 'date';
      dateNum.textContent = formatDate(d);

      const moonWrap = document.createElement('div');
      moonWrap.className = 'moon';
      const frac = lunarPhaseFraction(d);
      moonWrap.innerHTML = moonSVG(frac);

      dayEl.appendChild(weekday);
      dayEl.appendChild(dateNum);
      dayEl.appendChild(moonWrap);

      dayEl.addEventListener('click', ()=>{ selectDay(i); });
      dayEl.addEventListener('keydown', (e)=>{ if(e.key==='Enter') selectDay(i); });

      weekWrap.appendChild(dayEl);

      // labels row (non-skewed)
      const lbl = document.createElement('div');
      lbl.className = 'label';
      lbl.textContent = `${weekdaysJP[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}`;
      weekLabels.appendChild(lbl);
    }

    // initial selection
    updateSelection();
    updateTodayInfo();
  }

  function updateSelection(){
    const days = weekWrap.querySelectorAll('.day');
    days.forEach((el, idx)=>{
      el.classList.toggle('selected', idx === selectedIndex);
    });

    const selDate = addDays(startDate, selectedIndex);
    bigDate.textContent = selDate.getDate();
    // Example status logic: weekends are Day off
    const isWeekend = (selDate.getDay() === 0 || selDate.getDay() === 6);
    statusText.textContent = isWeekend ? '休日 | Day off' : '平日 | Weekday';
    // Move selectedStrip to align visually with selected circle
    // We'll compute the center of the selected element and position the strip
    const selEl = weekWrap.querySelector('.day.selected');
    if(selEl){
      const wrapRect = weekWrap.getBoundingClientRect();
      const elRect = selEl.getBoundingClientRect();
      const centerX = (elRect.left + elRect.right)/2 - wrapRect.left;
      const strip = document.getElementById('selectedStrip');
      // center the strip on the selected circle
      strip.style.left = `${centerX}px`;
    }
  }

  function selectDay(i){
    selectedIndex = i;
    updateSelection();
  }

  // Controls
  document.getElementById('prevWeek').addEventListener('click', ()=>{
    startDate = addDays(startDate, -7);
    buildWeek();
  });
  document.getElementById('nextWeek').addEventListener('click', ()=>{
    startDate = addDays(startDate, 7);
    buildWeek();
  });

  // Keyboard navigation
  window.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowLeft'){ selectedIndex = Math.max(0, selectedIndex - 1); updateSelection(); }
    if(e.key === 'ArrowRight'){ selectedIndex = Math.min(6, selectedIndex + 1); updateSelection(); }
    if(e.key === 'ArrowUp'){ /* reserved */ }
    if(e.key === 'ArrowDown'){ /* reserved */ }
  });

  function updateTodayInfo(){
    const t = new Date();
    todayInfo.textContent = `Today: ${t.getFullYear()}-${t.getMonth()+1}-${t.getDate()}`;
  }

  // Initialize: set startDate to the Monday (or desired anchor) of the week containing startDate
  (function normalizeStart(){
    // If you want the week to start on Thursday like the image, adjust offset
    // Here we align so that selectedIndex=4 corresponds to the "center" day
    const anchor = cloneDate(startDate);
    // shift back so that selectedIndex points to the 5th day (index 4)
    startDate = addDays(anchor, -selectedIndex);
  })();

  buildWeek();

  // Expose a small API for external customization (optional)
  window.P3Calendar = {
    setStartDate: function(d){ startDate = new Date(d); buildWeek(); },
    selectIndex: function(i){ selectedIndex = i; updateSelection(); }
  };

})();
</script>
</body>
</html>
