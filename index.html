<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Persona‑style Lunar Calendar</title>
<style>
  :root{
    --bg:#071028;
    --panel:#0f2a56;
    --accent:#2f6cff;
    --accent-2:#1b3f7a;
    --muted:#9fb0d6;
    --white:#ffffff;
    --holiday:#ff5b6b;
    --today-yellow:#ffd94a;
    --glass: rgba(255,255,255,0.04);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:transparent;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;color:var(--white)}
  /* Embed container sized for Notion/GitHub embeds */
  .embed {
    width:100%;
    max-width:820px;
    margin:0 auto;
    aspect-ratio:16/9;
    padding:18px;
  }

  .card {
    width:100%;
    height:100%;
    border-radius:14px;
    background:
      radial-gradient(1200px 600px at 10% 10%, rgba(47,108,255,0.08), transparent 8%),
      linear-gradient(180deg,#071028 0%, #02040a 100%);
    position:relative;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(2,6,23,0.6);
    padding:18px;
  }

  /* Top-left Day off / Holiday banner */
  .banner {
    position:absolute;
    left:18px;
    top:18px;
    display:inline-flex;
    gap:10px;
    align-items:center;
    padding:8px 12px;
    border-radius:999px;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#001;
    font-weight:800;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-size:12px;
    box-shadow:0 6px 18px rgba(20,40,90,0.35);
    z-index:30;
  }
  .banner .jp { font-weight:900; font-size:11px; color:#fff; filter:drop-shadow(0 2px 6px rgba(0,0,0,0.6)); }
  .banner .en { color:#fff; opacity:0.95; font-size:11px; }

  /* Big date block bottom-left */
  .big-date {
    position:absolute;
    left:18px;
    bottom:18px;
    background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border-radius:10px;
    padding:12px 14px;
    display:flex;
    flex-direction:column;
    gap:4px;
    z-index:20;
    min-width:110px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
  }
  .big-date .num { font-size:36px; font-weight:900; line-height:1; color:var(--white); }
  .big-date .month { font-size:11px; text-transform:uppercase; color:var(--muted); letter-spacing:0.12em; }

  /* Diagonal 7-day timeline */
  .timeline-wrap {
    position:absolute;
    right:18px;
    top:18px;
    bottom:18px;
    width:min(68%,520px);
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }

  .timeline {
    width:100%;
    height:100%;
    transform:skewY(-18deg);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:28px 10px;
    pointer-events:auto;
  }

  .day {
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:12px;
    transform:skewY(18deg);
    transition:transform .18s cubic-bezier(.2,.9,.2,1), filter .18s;
    position:relative;
    pointer-events:auto;
  }

  .day:hover { transform:skewY(18deg) scale(1.06); z-index:40; filter:brightness(1.12); }

  .labels {
    text-align:right;
    min-width:72px;
    color:var(--muted);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.12em;
    display:flex;
    flex-direction:column;
    gap:2px;
  }
  .labels .weekday { font-weight:800; color:var(--white); }
  .labels .md { font-size:10px; opacity:.9; }

  /* Moon container */
  .moon-wrap {
    width:48px;
    height:48px;
    border-radius:50%;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(180deg,#e6eefc 0%, #b6c6e6 40%, #7b86a0 100%);
    box-shadow:0 6px 18px rgba(0,0,0,0.6), inset 0 -6px 18px rgba(0,0,0,0.12);
    overflow:hidden;
    transition:transform .18s;
  }

  /* small ring for hover pop */
  .day:hover .moon-wrap { transform:scale(1.06); }

  /* targeting ring for today */
  .moon-wrap.today::after{
    content:"";
    position:absolute;
    inset:-8px;
    border-radius:50%;
    border:2px solid var(--today-yellow);
    box-shadow:0 0 18px rgba(255,217,74,0.85);
    animation:target 1.6s ease-out infinite;
  }
  @keyframes target {
    0%{ transform:scale(.9); opacity:1 }
    70%{ transform:scale(1.18); opacity:0 }
    100%{ transform:scale(1.18); opacity:0 }
  }

  /* moon face (base) */
  .moon {
    width:86%;
    height:86%;
    border-radius:50%;
    position:relative;
    overflow:hidden;
    display:block;
    transform:translateZ(0);
  }

  /* shadow overlay used to create phases via clip-path */
  .moon .shadow {
    position:absolute;
    inset:0;
    background:#000;
    mix-blend-mode:normal;
    transition:all .28s ease;
  }

  /* yellow tint for current day */
  .moon-wrap.today .moon {
    background: radial-gradient(circle at 30% 30%, #fff7c0 0%, #ffd94a 40%, #c79a2a 100%);
  }

  /* holiday accent */
  .day.holiday .labels .weekday,
  .day.holiday .labels .md { color:var(--holiday); }

  /* small responsive tweaks */
  @media (max-width:640px){
    .embed{max-width:520px}
    .moon-wrap{width:42px;height:42px}
    .big-date .num{font-size:28px}
    .labels{min-width:60px;font-size:10px}
  }
  @media (max-width:420px){
    .timeline-wrap{display:block; right:12px; top:12px; bottom:12px; width:62%}
    .big-date{left:12px; bottom:12px}
    .banner{left:12px; top:12px; padding:6px 10px; font-size:11px}
  }

  /* small accessibility focus */
  .day:focus-within, .day:focus { outline:2px solid rgba(255,255,255,0.06); }
</style>
</head>
<body>
  <div class="embed" aria-hidden="false">
    <div class="card" role="application" aria-label="Lunar calendar">
      <div class="banner" id="banner" style="display:none">
        <span class="jp">休日</span>
        <span class="en">DAY OFF</span>
      </div>

      <div class="big-date" aria-hidden="true">
        <div class="num" id="big-day">--</div>
        <div class="month" id="big-month">--</div>
      </div>

      <div class="timeline-wrap">
        <div class="timeline" id="timeline" role="list" aria-label="7 day timeline"></div>
      </div>
    </div>
  </div>

<script>
/* ---------- Utilities ---------- */
function addDays(d, n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function pad(n){ return String(n).padStart(2,'0'); }

/* ---------- Lunar phase calculation (accurate synodic method) ----------
   Uses Julian date and synodic month to compute lunar age fraction (0..1).
   Then we compute a phase mask for CSS: we will set shadow position/shape
   based on the phase fraction (0=new, 0.5=full).
*/
const SYNODIC_MONTH = 29.530588853;

function toJulianDate(date){
  // Convert to UTC midnight fraction
  return date.getTime()/86400000 + 2440587.5;
}
function lunarAgeFraction(date){
  // reference new moon 2000-01-06 18:14 UTC (JD 2451550.1) is common anchor
  const jd = toJulianDate(date);
  const daysSince = jd - 2451550.1;
  const frac = (daysSince / SYNODIC_MONTH) % 1;
  return frac < 0 ? frac + 1 : frac;
}

/* Map fraction to descriptive phase and to a CSS shadow shape */
function phaseInfo(date){
  const f = lunarAgeFraction(date);
  const age = f * SYNODIC_MONTH;
  let name = 'new';
  if (age < 1.84566) name='new';
  else if (age < 5.53699) name='waxing-crescent';
  else if (age < 9.22831) name='first-quarter';
  else if (age < 12.91963) name='waxing-gibbous';
  else if (age < 16.61096) name='full';
  else if (age < 20.30228) name='waning-gibbous';
  else if (age < 23.99361) name='last-quarter';
  else if (age < 27.68493) name='waning-crescent';
  else name='new';
  return { fraction: f, age, name };
}

/* Create a CSS clip-path / shadow style for the moon shadow based on fraction.
   We'll use an ellipse positioned left/right depending on waxing/waning.
   fraction 0 => fully dark (new), 0.5 => fully lit (full).
*/
function shadowStyleForFraction(f){
  // f in [0,1], 0=new, 0.5=full, 1=new
  // Convert to -1..1 where -1 = new (dark on right), 0 = full, +1 = new (dark on left)
  const x = (f - 0.5) * 2;
  // We'll compute an ellipse offset and size
  // offset controls where the dark ellipse center is (in %)
  const offset = 50 + x * 40; // 10%..90%
  // size controls how big the dark ellipse is
  const size = 60 + Math.abs(x) * 40; // 60%..100%
  // opacity for shadow
  const opacity = 0.92 - Math.abs(x) * 0.3;
  // For near-full (|x| small) make shadow thin
  const blur = 0;
  // Return CSS for background + clip-path fallback
  // We'll use radial-gradient positioned to create the shadow silhouette
  return {
    background: `radial-gradient(closest-side at ${offset}% 50%, rgba(0,0,0,${opacity}) 0%, rgba(0,0,0,${opacity}) ${size}%, rgba(0,0,0,0) ${size+1}%)`
  };
}

/* ---------- French holidays (fixed + movable) ---------- */
function computeEaster(year){
  // Meeus algorithm
  const a = year % 19;
  const b = Math.floor(year/100);
  const c = year % 100;
  const d = Math.floor(b/4);
  const e = b % 4;
  const f = Math.floor((b+8)/25);
  const g = Math.floor((b-f+1)/3);
  const h = (19*a + b - d - g + 15) % 30;
  const i = Math.floor(c/4);
  const k = c % 4;
  const l = (32 + 2*e + 2*i - h - k) % 7;
  const m = Math.floor((a + 11*h + 22*l)/451);
  const month = Math.floor((h + l - 7*m + 114)/31); // 3=March,4=April
  const day = ((h + l - 7*m + 114) % 31) + 1;
  return new Date(year, month-1, day);
}
function getFrenchHolidays(year){
  const easter = computeEaster(year);
  const easterMonday = addDays(easter,1);
  const ascension = addDays(easter,39);
  const whitMonday = addDays(easter,50);
  const fixed = [
    [1,1,'Jour de l\\'an'],
    [5,1,'Fête du Travail'],
    [5,8,'Victoire 1945'],
    [7,14,'Fête Nationale'],
    [8,15,'Assomption'],
    [11,1,'Toussaint'],
    [11,11,'Armistice'],
    [12,25,'Noël']
  ];
  const out = fixed.map(([m,d,label])=>({date:new Date(year,m-1,d),label}));
  out.push({date:easterMonday,label:'Lundi de Pâques'});
  out.push({date:ascension,label:'Ascension'});
  out.push({date:whitMonday,label:'Lundi de Pentecôte'});
  return out;
}
function holidayLabel(date, holidays){
  for(const h of holidays) if(sameDay(h.date,date)) return h.label;
  return null;
}

/* ---------- Build UI ---------- */
const weekday = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

function build(){
  const now = new Date();
  const year = now.getFullYear();
  const holidays = getFrenchHolidays(year);

  // big date
  document.getElementById('big-day').textContent = now.getDate();
  document.getElementById('big-month').textContent = months[now.getMonth()] + ' ' + year;

  // 7-day window centered on today
  const days = [];
  for(let i=-3;i<=3;i++) days.push(addDays(now,i));

  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  let todayIsHoliday = false;
  for(const d of days){
    const isToday = sameDay(d, now);
    const hol = holidayLabel(d, holidays);
    if(isToday && hol) todayIsHoliday = true;

    const dayEl = document.createElement('div');
    dayEl.className = 'day' + (hol ? ' holiday' : '') + (isToday ? ' today' : '');
    dayEl.setAttribute('role','listitem');

    const labels = document.createElement('div');
    labels.className = 'labels';
    const wd = document.createElement('div'); wd.className='weekday'; wd.textContent = weekday[d.getDay()];
    const md = document.createElement('div'); md.className='md'; md.textContent = pad(d.getDate()) + '/' + pad(d.getMonth()+1);
    labels.appendChild(wd); labels.appendChild(md);

    const moonWrap = document.createElement('div');
    moonWrap.className = 'moon-wrap' + (isToday ? ' today' : '');
    // moon element
    const moon = document.createElement('div');
    moon.className = 'moon';
    // shadow element
    const shadow = document.createElement('div');
    shadow.className = 'shadow';

    // compute phase and style
    const p = phaseInfo(d);
    const styleObj = shadowStyleForFraction(p.fraction);
    // apply style properties
    for(const k in styleObj) shadow.style[k] = styleObj[k];

    // add accessible tooltip
    moon.setAttribute('aria-hidden','true');
    dayEl.title = `${p.name.replace('-',' ')} • ${wd.textContent} ${md.textContent}` + (hol ? ` • ${hol}` : '') + (isToday ? ' • Aujourd\\'hui' : '');

    moon.appendChild(shadow);
    moonWrap.appendChild(moon);

    dayEl.appendChild(labels);
    dayEl.appendChild(moonWrap);

    timeline.appendChild(dayEl);
  }

  // banner logic: show when today is weekend or holiday
  const banner = document.getElementById('banner');
  const isWeekend = now.getDay()===0 || now.getDay()===6;
  if(todayIsHoliday || isWeekend){
    banner.style.display = 'inline-flex';
    // keep Japanese + English text as in the image
    banner.querySelector('.jp').textContent = '休日';
    banner.querySelector('.en').textContent = todayIsHoliday ? 'DAY OFF' : 'DAY OFF';
  } else {
    banner.style.display = 'none';
  }
}

/* initial build */
build();

/* refresh at local midnight + small buffer to ensure date change */
(function scheduleMidnight(){
  const now = new Date();
  const next = new Date(now);
  next.setHours(24,0,5,0);
  const ms = next - now;
  setTimeout(function(){
    build();
    scheduleMidnight();
  }, ms);
})();

/* Optional: observe resize to keep embed responsive in Notion/GitHub */
(function responsiveFix(){
  // nothing required; CSS uses width:100% and aspect-ratio for embed sizing
})();
</script>
</body>
</html>
