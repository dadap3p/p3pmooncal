<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Persona 3 Style Calendar — Navy + Divider + Seamless Moons</title>
<style>
:root{
  --navy:#001f3f;        /* deep navy background requested */
  --stripe1:#003f9f;
  --stripe2:#0066ff;
  --stripe3:#00284f;
  --white:#ffffff;
  --yellow:#ffe500;
  --accent:rgba(0,160,255,0.45);
  --shadow: 0 14px 48px rgba(0,0,0,0.65);
  --font-sans: "Inter", "Arial", sans-serif;
}

/* Reset + container */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--navy);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
.widget{
  width:100%;
  max-width:1100px;
  margin:0 auto;
  aspect-ratio:16/9;
  min-height:340px;
  background:linear-gradient(180deg,var(--navy) 0%, #07162a 100%);
  border-radius:8px;
  overflow:hidden;
  position:relative;
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,0.03);
}

/* Diagonal stripes */
.stripe{
  position:absolute;
  left:-36%;
  width:210%;
  height:280px;
  transform:rotate(14deg);
  top:20%;
  background:linear-gradient(90deg,var(--stripe1),var(--stripe2));
  z-index:2;
  mix-blend-mode:screen;
}
.stripe.layer2{ top:46%; height:160px; left:-34%; background:linear-gradient(90deg,#00306f,#0058d6); z-index:1; opacity:.95; mix-blend-mode:screen; }
.stripe.layer3{ top:62%; height:120px; left:-30%; background:var(--stripe3); z-index:0; opacity:.78; mix-blend-mode:screen; }

/* Top-left holiday banner */
.banner{
  position:absolute;
  top:14px;
  left:14px;
  height:62px;
  min-width:300px;
  padding:0 18px;
  display:flex;
  align-items:center;
  gap:12px;
  color:var(--white);
  font-weight:900;
  letter-spacing:2px;
  z-index:20;
  border-radius:6px;
  background:linear-gradient(90deg,var(--stripe2),var(--stripe1));
  box-shadow:0 6px 30px rgba(0,120,255,0.18);
  font-size:clamp(14px,2.2vw,22px);
}
.banner .jp{ font-size:1.05em; opacity:0.98; }
.banner .eng{ font-size:.62em; opacity:0.98; margin-left:6px; font-weight:700; }

/* Top-right caption */
.caption{
  position:absolute;
  right:18px;
  top:18px;
  color:rgba(255,255,255,0.9);
  font-weight:700;
  font-size:clamp(10px,1.2vw,14px);
  z-index:20;
  text-align:right;
  letter-spacing:1px;
}

/* Left date block */
.date-block{
  position:absolute;
  left:6%;
  top:18%;
  z-index:10;
  color:var(--white);
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}
.date-block .year{ font-weight:900; font-size:clamp(20px,3.2vw,44px); letter-spacing:2px; }
.date-block .month{ font-size:clamp(12px,1.6vw,20px); opacity:0.95; margin-top:6px; }
.date-block .big{
  font-weight:900;
  font-size:clamp(90px,14vw,260px);
  line-height:.78;
  margin-top:6px;
  color:var(--white);
  opacity:0.98;
}

/* Diagonal timeline */
.timeline{
  position:absolute;
  width:92%;
  height:6px;
  background:linear-gradient(90deg, rgba(255,255,255,0.06), rgba(255,255,255,0.18));
  transform:rotate(-35deg);
  left:4%;
  top:58%;
  z-index:9;
  border-radius:6px;
  box-shadow:0 6px 30px rgba(0,0,0,0.6);
}

/* White divider line centered on the diagonal timeline */
.divider{
  position:absolute;
  width:92%;
  height:2px;
  background:var(--white);
  transform:rotate(-35deg);
  left:4%;
  top:58%;
  z-index:18;
  opacity:0.95;
  mix-blend-mode:overlay;
  filter:drop-shadow(0 2px 6px rgba(255,255,255,0.03));
}

/* Days container */
.days{ position:absolute; inset:0; z-index:15; pointer-events:auto; }

/* Day bubble */
.day{
  position:absolute;
  transform:translate(-50%,-50%);
  text-align:center;
  color:var(--white);
  transition:transform .22s ease, filter .22s ease;
  cursor:default;
  user-select:none;
  width:clamp(84px,9.2vw,150px);
}
.day:hover{ transform:translate(-50%,-50%) scale(1.18); filter:drop-shadow(0 0 30px rgba(255,255,255,0.08)); z-index:60; }

/* number and weekday */
.num{ font-weight:900; font-size:clamp(26px,3.8vw,60px); line-height:.9; }
.week{ font-size:clamp(10px,1.2vw,14px); letter-spacing:4px; margin-top:6px; opacity:0.95; }

/* Moon visuals - improved seamless rendering */
.moon{
  width:clamp(52px,6.6vw,92px);
  height:clamp(52px,6.6vw,92px);
  border-radius:50%;
  margin:10px auto 0;
  position:relative;
  overflow:visible;
  display:block;
  background: radial-gradient(circle at 35% 35%, #f6f6f6 0%, #e6e6e6 35%, #d6d6d6 60%, #111 62%);
  box-shadow: inset 0 -6px 18px rgba(0,0,0,0.45);
  /* smoother edges */
  -webkit-mask-image: radial-gradient(circle at 50% 50%, black 98%, transparent 100%);
  mask-image: radial-gradient(circle at 50% 50%, black 98%, transparent 100%);
}

/* Lit disc (before) and dark mask (after) tuned for seamless blending.
   Use subtle radial gradients and a soft edge to avoid hard cut lines. */
.moon::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background: radial-gradient(circle at 40% 40%, var(--lit-color, #fff) 0%, rgba(255,255,255,0.95) 45%, rgba(255,255,255,0.85) 60%, rgba(255,255,255,0.6) 100%);
  mix-blend-mode:screen;
  transform: translateX(var(--mask-offset, 0%));
  transition: transform .22s linear, background .22s linear;
  z-index:2;
  filter:blur(0.6px);
}
.moon::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background: radial-gradient(circle at 50% 50%, rgba(17,17,17,1) 0%, rgba(17,17,17,0.98) 60%, rgba(17,17,17,0.9) 100%);
  transform: translateX(var(--mask-invert, 0%));
  transition: transform .22s linear;
  z-index:3;
  mix-blend-mode:normal;
  opacity:1;
  filter:blur(0.6px);
}

/* Today's accent: yellow lit + white border + glow + ring */
.day.today .moon::before{ background: radial-gradient(circle at 40% 40%, var(--yellow) 0%, rgba(255,229,0,0.95) 45%, rgba(255,229,0,0.6) 100%); box-shadow:0 0 18px rgba(255,229,0,0.45); }
.day.today .moon{ border:4px solid rgba(255,255,255,0.95); box-shadow:0 0 28px rgba(255,229,0,0.12), inset 0 -6px 18px rgba(0,0,0,0.45); }

/* Targeting ring */
.ring{
  position:absolute;
  width:calc(100% + 18px);
  height:calc(100% + 18px);
  border-radius:50%;
  border:3px solid rgba(0,160,255,0.45);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 2.6s infinite;
  z-index:1;
  pointer-events:none;
}
.ring:after{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:50%;
  border:2px solid rgba(0,160,255,0.25);
}

/* Hover moon scale */
.day:hover .moon{ transform:scale(1.08); transition:transform .22s ease; }

/* Pulse animation */
@keyframes pulse{
  0%{ transform:translate(-50%,-50%) scale(.86); opacity:.9 }
  50%{ transform:translate(-50%,-50%) scale(1.12); opacity:1 }
  100%{ transform:translate(-50%,-50%) scale(.86); opacity:.9 }
}

/* small responsive tweaks */
@media (max-width:520px){
  .banner{ left:8px; top:8px; min-width:200px; height:52px; font-size:14px }
  .date-block{ left:6%; top:12% }
  .date-block .big{ font-size:clamp(48px,10vw,120px) }
  .day{ width:clamp(70px,12vw,120px) }
}
</style>
</head>
<body>
  <div class="widget" role="region" aria-label="Persona 3 style calendar">
    <div class="stripe"></div>
    <div class="stripe layer2"></div>
    <div class="stripe layer3"></div>

    <div class="banner" aria-hidden="false">
      <div class="jp">休日</div>
      <div class="eng" id="holiday">Day off</div>
    </div>

    <div class="caption">ペルソナ3 リロード デイリーライフトレーラー</div>

    <div class="date-block" aria-hidden="false">
      <div class="year" id="year"></div>
      <div class="month" id="month"></div>
      <div class="big" id="big"></div>
    </div>

    <div class="timeline" aria-hidden="true"></div>
    <div class="divider" aria-hidden="true"></div> <!-- white line in the middle of dates -->
    <div id="days" class="days" aria-live="polite"></div>
  </div>

<script>
/* ---------- Preset: keep demo behavior as before (adjust as needed) ---------- */
const demoPreset = "reload"; // "reload" | "second" | "live"
const presets = {
  reload: { year:2009, month:6, day:7 },   // July 7, 2009
  second: { year:2026, month:5, day:20 }   // June 20, 2026
};

let centerDate;
if (demoPreset === "reload") centerDate = new Date(presets.reload.year, presets.reload.month, presets.reload.day);
else if (demoPreset === "second") centerDate = new Date(presets.second.year, presets.second.month, presets.second.day);
else { const now = new Date(); centerDate = new Date(now.getFullYear(), now.getMonth(), now.getDate()); }

/* Header */
const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
document.getElementById("year").textContent = centerDate.getFullYear();
document.getElementById("month").textContent = months[centerDate.getMonth()];
document.getElementById("big").textContent = centerDate.getDate();

/* Week labels */
const week = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

/* Easter algorithm + French holidays */
function easterDate(y){
  const a = y % 19;
  const b = Math.floor(y/100);
  const c = y % 100;
  const d = Math.floor(b/4);
  const e = b % 4;
  const f = Math.floor((b+8)/25);
  const g = Math.floor((b-f+1)/3);
  const h = (19*a + b - d - g + 15) % 30;
  const i = Math.floor(c/4);
  const k = c % 4;
  const l = (32 + 2*e + 2*i - h - k) % 7;
  const m = Math.floor((a + 11*h + 22*l) / 451);
  const month = Math.floor((h + l - 7*m + 114) / 31);
  const day = ((h + l - 7*m + 114) % 31) + 1;
  return new Date(y, month-1, day);
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmt(d){ return String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0"); }
function frenchHolidays(year){
  const e = easterDate(year);
  const map = new Map();
  const fixed = {
    "01-01":"🇫🇷 New Year's Day",
    "05-01":"🇫🇷 Labour Day",
    "05-08":"🇫🇷 Victory Day",
    "07-14":"🇫🇷 Bastille Day",
    "08-15":"🇫🇷 Assumption",
    "11-01":"🇫🇷 All Saints",
    "11-11":"🇫🇷 Armistice",
    "12-25":"🇫🇷 Christmas"
  };
  for(const k in fixed) map.set(k,fixed[k]);
  map.set(fmt(addDays(e,1)),"🇫🇷 Easter Monday");
  map.set(fmt(addDays(e,39)),"🇫🇷 Ascension");
  map.set(fmt(addDays(e,50)),"🇫🇷 Whit Monday");
  return map;
}
const holidayMap = frenchHolidays(centerDate.getFullYear());
function holidayName(d){ return holidayMap.get(fmt(d)) || ""; }
document.getElementById("holiday").textContent = holidayName(centerDate) || "Day off";

/* ---------- Moon phase calculation (smoother mapping) ----------
   Use cosine easing to produce smoother crescent/gibbous transitions.
   Returns fraction 0..1 where 0 = new moon, 0.5 = full moon.
*/
function moonPhaseFraction(date){
  const known = Date.UTC(2000,0,6,18,14,0);
  const t = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0);
  const days = (t - known) / 86400000;
  const synodic = 29.530588853;
  let phase = ((days % synodic) + synodic) % synodic / synodic;
  return phase;
}

/* Create moon element with smoother mask math */
function createMoonEl(phaseFrac, isHighlighted){
  const moon = document.createElement("span");
  moon.className = "moon";
  const litColor = isHighlighted ? "var(--yellow)" : "#ffffff";
  moon.style.setProperty("--lit-color", litColor);

  // Map phase to smooth offsets using cosine easing for softer edges
  // phase p in [0,1] -> offset in [-60,60]
  const p = phaseFrac;
  // Use eased value so crescents are smoother
  const eased = (1 - Math.cos(2 * Math.PI * p)) / 2; // 0..1
  // centerOffset: 0 at full moon (p=0.5 -> eased=1), extremes at new moon
  const centerOffset = (0.5 - p) * 120 * (0.9 + 0.1 * Math.cos(2*Math.PI*p)); // tuned multiplier
  const invert = -centerOffset * 0.92;
  moon.style.setProperty("--mask-offset", centerOffset + "%");
  moon.style.setProperty("--mask-invert", invert + "%");
  return moon;
}

/* ---------- Build 8-day diagonal timeline ---------- */
const container = document.getElementById("days");
let start = new Date(centerDate);
start.setDate(centerDate.getDate() - 3);

for (let i = 0; i < 8; i++){
  const d = new Date(start);
  d.setDate(start.getDate() + i);

  const node = document.createElement("div");
  node.className = "day";

  // Diagonal placement tuned visually
  const left = 12 + i * 10.5;
  const top = 82 - i * 9.6;
  node.style.left = left + "%";
  node.style.top = top + "%";

  const n = document.createElement("div");
  n.className = "num";
  n.textContent = d.getDate();

  const w = document.createElement("div");
  w.className = "week";
  w.textContent = week[d.getDay()];

  // Highlight rules per preset
  let highlight = false;
  if (demoPreset === "reload") {
    highlight = (d.getFullYear() === 2009 && d.getMonth() === 6 && d.getDate() === 7);
  } else if (demoPreset === "second") {
    highlight = (d.getFullYear() === 2026 && d.getMonth() === 5 && d.getDate() === 20);
  } else {
    const today = new Date();
    highlight = (d.toDateString() === today.toDateString());
  }

  const moonEl = createMoonEl(moonPhaseFraction(d), highlight);

  if (highlight){
    node.classList.add("today");
    const r = document.createElement("div");
    r.className = "ring";
    moonEl.appendChild(r);
  }

  node.appendChild(n);
  node.appendChild(w);
  node.appendChild(moonEl);

  // Accessibility label includes holiday if present
  const h = holidayName(d);
  const label = `${d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"})}` + (h ? ` • ${h}` : "");
  node.setAttribute("aria-label", label);

  container.appendChild(node);
}

/* Auto-refresh at midnight when live */
if (demoPreset === "live") {
  (function scheduleMidnightRefresh(){
    const now = new Date();
    const next = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 0, 0, 5);
    const ms = next - now;
    setTimeout(()=> location.reload(), ms);
  })();
}

/* Keyboard focus */
document.querySelectorAll(".day").forEach(el=>{
  el.tabIndex = 0;
  el.addEventListener("focus", ()=> el.classList.add("focused"));
  el.addEventListener("blur", ()=> el.classList.remove("focused"));
});
</script>
</body>
</html>
