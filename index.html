<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lunar Calendar</title>
  <style>
    body {
      background: #0a2a4f;
      font-family: 'Arial Black', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      transform: rotate(-15deg);
      gap: 20px;
    }
    .day {
      background: #1c3b70;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 14px;
      text-align: center;
    }
    .highlight {
      background: #2a6edc;
      grid-column: span 2;
      border-radius: 10px;
      width: 160px;
      height: 100px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .label {
      font-size: 12px;
      margin-top: 5px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="calendar">
    <div class="day">Jul 2<br><span class="label">Thu</span></div>
    <div class="day">Jul 3<br><span class="label">Fri</span></div>
    <div class="day">Jul 4<br><span class="label">Sat</span></div>
    <div class="day">Jul 5<br><span class="label">Sun</span></div>
    <div class="day">Jul 6<br><span class="label">Mon</span></div>
    <div class="highlight">
      2009 Jul 7<br>
      <span class="label">休日 Day Off</span>
    </div>
    <div class="day">Jul 8<br><span class="label">Wed</span></div>
  </div>
</body>
</html>
