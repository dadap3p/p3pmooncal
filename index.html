<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Persona 3 Portable — Calendar</title>
<style>
  :root{
    --bg:#030617;
    --card-bg:#07132a;
    --stripe-1:rgba(31,107,255,0.95);
    --stripe-2:rgba(10,30,80,0.85);
    --accent-yellow:#ffd94a;
    --accent-red:#ff4b6e;
    --accent-orange:#ff9b4b;
    --muted:#9fb4ff;
    --white:#ffffff;
    --diag:-34deg;
    --day-size:4.6rem;
    --gap:1.15rem;
    --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  }

  /* page reset */
  *{box-sizing:border-box}
  html,body{height:100%;background:#000;margin:0;font-family:var(--font);-webkit-font-smoothing:antialiased}
  /* wrapper tuned for Notion/GitHub embed */
  .p3p-wrap{width:100%;max-width:980px;aspect-ratio:16/7;padding:12px;margin:0 auto}
  .p3p-card{
    position:relative;height:100%;width:100%;border-radius:12px;overflow:hidden;
    color:var(--white);
    background:
      linear-gradient(180deg, rgba(6,18,40,0.6) 0%, rgba(2,6,18,1) 60%),
      radial-gradient(1200px 300px at 10% 0%, rgba(31,75,160,0.12), transparent 20%);
    box-shadow:0 18px 48px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.02);
  }

  /* blue diagonal stripe layers (game-like) */
  .p3p-card::before,
  .p3p-card::after{
    content:"";position:absolute;inset:-40%;pointer-events:none;
    transform:rotate(var(--diag));
  }
  .p3p-card::before{
    background:
      repeating-linear-gradient(90deg,
        rgba(31,107,255,0.18) 0 8px,
        rgba(10,30,80,0.06) 8px 16px);
    mix-blend-mode:screen;opacity:0.95;
  }
  .p3p-card::after{
    background:linear-gradient(90deg, rgba(10,30,80,0.9), rgba(10,30,80,0.6) 40%, transparent 60%);
    opacity:0.95;
  }

  .p3p-inner{position:relative;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:18px 22px}

  /* top row */
  .p3p-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .p3p-left{display:flex;flex-direction:column;gap:10px;min-width:0}

  /* small top-left banner */
  .p3p-banner{
    display:inline-flex;flex-direction:column;gap:2px;padding:6px 12px;border-radius:8px;
    background:linear-gradient(135deg,var(--accent-red),var(--accent-orange));
    box-shadow:0 6px 18px rgba(0,0,0,0.6);
    text-transform:uppercase;font-weight:700;font-size:12px;letter-spacing:0.12em;
  }
  .p3p-banner .sub{font-weight:600;font-size:11px;opacity:0.95}

  /* big blue stripe (main date band) */
  .p3p-stripe{
    display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-radius:10px;
    background:linear-gradient(90deg,#0b2a6b 0%, #1b4fb0 40%, #3f7fff 100%);
    box-shadow:0 12px 28px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
    transform:translateZ(0);
  }
  .p3p-stripe-left{display:flex;flex-direction:column;gap:4px}
  .p3p-jp{font-size:12px;opacity:0.95;letter-spacing:0.12em}
  .p3p-stripe-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.14em}

  .p3p-stripe-date{ text-align:right; min-width:170px }
  .p3p-stripe-date-main{font-size:clamp(28px,4.2vw,40px);font-weight:900;letter-spacing:0.12em}
  .p3p-stripe-date-sub{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.14em;margin-top:4px}

  /* top-right meta (Japanese text in image) */
  .p3p-meta{ text-align:right; max-width:36%; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em }
  .p3p-meta .title{font-weight:700;color:var(--white);font-size:13px;letter-spacing:0.14em}

  /* diagonal timeline container */
  .p3p-timeline-wrap{position:relative;display:flex;align-items:center;justify-content:center;overflow:visible;padding:6px 0}
  .p3p-timeline{
    display:flex;gap:var(--gap);transform:rotate(var(--diag));align-items:center;padding:6px;
    transition:transform .18s ease;
  }

  /* day circle */
  .p3p-day{
    width:var(--day-size);height:var(--day-size);border-radius:999px;position:relative;
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(0,0,0,0.35));
    box-shadow:0 8px 18px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
    display:flex;align-items:center;justify-content:center;cursor:default;overflow:visible;
    transition:transform .18s ease, box-shadow .18s ease;
  }
  .p3p-day:hover{transform:translateY(-6px) scale(1.08);box-shadow:0 22px 36px rgba(0,0,0,0.9)}
  .p3p-day-inner{transform:rotate(calc(-1 * var(--diag)));display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;padding:6px}

  .p3p-dow{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em}
  .p3p-num{font-weight:900;font-size:18px;letter-spacing:0.06em}

  /* moon visuals using CSS masks/gradients */
  .p3p-moon{
    width:1.12rem;height:1.12rem;border-radius:50%;position:relative;overflow:hidden;
    background:radial-gradient(circle at 30% 25%, #fff 0%, #d0d0d0 45%, #8a8a8a 100%);
    box-shadow:0 2px 6px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* mask layer that moves horizontally based on --phase (0..1) */
  .p3p-moon::before{
    content:"";position:absolute;inset:0;border-radius:50%;
    background:linear-gradient(90deg, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.98) 48%, rgba(0,0,0,0.0) 52%, rgba(0,0,0,0.0) 100%);
    transform:translateX(calc((var(--phase,0.5) - 0.5) * 220%));
    mix-blend-mode:multiply;transition:transform .18s linear;
  }
  /* subtle limb shading for realism */
  .p3p-moon::after{
    content:"";position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 70% 75%, rgba(0,0,0,0.85) 0%, transparent 60%);
    opacity:0.6;
  }

  /* current day styling: yellow moon + targeting ring */
  .p3p-day.current .p3p-moon{
    background:radial-gradient(circle at 30% 25%, #fff7b0 0%, var(--accent-yellow) 45%, #c89b1a 100%);
  }
  .p3p-day.current::before{
    content:"";position:absolute;inset:-6px;border-radius:999px;border:2px solid rgba(255,255,255,0.12);
    box-shadow:0 6px 18px rgba(0,0,0,0.6);
  }
  .p3p-day.current::after{
    content:"";position:absolute;inset:-6px;border-radius:999px;border:2px solid var(--muted);
    box-shadow:0 0 18px rgba(78,163,255,0.9);animation:targetRing 1.6s ease-out infinite;
  }
  @keyframes targetRing{
    0%{transform:scale(.9);opacity:0}
    35%{transform:scale(1.05);opacity:1}
    100%{transform:scale(1.28);opacity:0}
  }

  /* bottom row */
  .p3p-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px;color:var(--muted);text-transform:uppercase;letter-spacing:0.12em;font-size:12px}
  .p3p-dot{width:10px;height:10px;border-radius:50%;background:var(--accent-yellow);box-shadow:0 0 10px rgba(255,217,74,0.9)}

  /* tooltips (title attribute fallback) */
  .p3p-day[role="button"]{outline:none}

  /* responsive */
  @media (max-width:820px){
    :root{--day-size:3.8rem;--gap:0.9rem}
    .p3p-stripe-date{min-width:120px}
    .p3p-meta{display:none}
  }
  @media (max-width:480px){
    :root{--day-size:3.1rem;--gap:0.7rem}
    .p3p-stripe-date-main{font-size:20px}
    .p3p-wrap{padding:8px}
  }
</style>
</head>
<body>
  <div class="p3p-wrap">
    <div class="p3p-card" id="p3p-card">
      <div class="p3p-inner">
        <div class="p3p-top">
          <div class="p3p-left">
            <!-- Top-left Day off / Holiday banner (hidden by default) -->
            <div class="p3p-banner" id="p3p-banner" style="display:none">
              <div class="main" id="p3p-banner-main">DAY OFF</div>
              <div class="sub" id="p3p-banner-sub"></div>
            </div>

            <!-- Big blue stripe with main date -->
            <div class="p3p-stripe">
              <div class="p3p-stripe-left">
                <div class="p3p-jp">休日 | Day off</div>
                <div class="p3p-stripe-label" id="p3p-stripe-label">JUILLET 2009</div>
              </div>
              <div class="p3p-stripe-date">
                <div class="p3p-stripe-date-main" id="p3p-date-main">07</div>
                <div class="p3p-stripe-date-sub" id="p3p-date-sub">Mardi · 07 / 07 / 2009</div>
              </div>
            </div>
          </div>

          <!-- Top-right meta (Japanese text) -->
          <div class="p3p-meta">
            <div class="title">ペルソナ3 リロード</div>
            <div class="desc">デイリーライフトレーラー — Calendrier stylisé</div>
          </div>
        </div>

        <!-- Diagonal timeline -->
        <div class="p3p-timeline-wrap" aria-hidden="false">
          <div class="p3p-timeline" id="p3p-timeline" role="list"></div>
        </div>

        <!-- Bottom row -->
        <div class="p3p-bottom">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="p3p-dot" aria-hidden="true"></div>
            <div id="p3p-bottom-text">AUJOURD'HUI</div>
          </div>
          <div id="p3p-moon-text" style="text-transform:uppercase;color:var(--white);font-weight:700"></div>
        </div>
      </div>
    </div>
  </div>

<script>
/* ---------- Utilities ---------- */
function startOfDay(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}

/* ---------- French holidays (fixed + movable) ---------- */
function easterSunday(year){
  // Meeus/Jones/Butcher algorithm
  const a = year % 19;
  const b = Math.floor(year / 100);
  const c = year % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}

function getFrenchHoliday(date){
  const y = date.getFullYear();
  const fixed = [
    {m:0,d:1,label:"Jour de l'an"},
    {m:4,d:1,label:"Fête du Travail"},
    {m:4,d:8,label:"Victoire 1945"},
    {m:6,d:14,label:"Fête Nationale"},
    {m:10,d:1,label:"Toussaint"},
    {m:10,d:11,label:"Armistice 1918"},
    {m:11,d:25,label:"Noël"}
  ];
  for(const f of fixed) if(date.getMonth()===f.m && date.getDate()===f.d) return f.label;

  const eas = easterSunday(y);
  const easMon = addDays(eas,1);
  const asc = addDays(eas,39);
  const whit = addDays(eas,50);
  if(isSameDay(date,easMon)) return "Lundi de Pâques";
  if(isSameDay(date,asc)) return "Ascension";
  if(isSameDay(date,whit)) return "Lundi de Pentecôte";
  return null;
}

/* ---------- Moon phase calculation (astronomical approximation) ----------
   Returns fraction in [0,1] where 0=new moon, 0.5=full moon.
   Uses a reference new moon and synodic month length.
*/
function moonPhaseFraction(date){
  const synodic = 29.53058867;
  // Reference new moon: 2000-01-06 18:14 UTC (widely used)
  const ref = Date.UTC(2000,0,6,18,14,0);
  const days = (Date.UTC(date.getFullYear(),date.getMonth(),date.getDate(),date.getHours(),date.getMinutes(),date.getSeconds()) - ref) / 86400000;
  const phase = ((days % synodic) + synodic) % synodic;
  return phase / synodic;
}

function moonPhaseName(frac){
  if(frac < 0.03 || frac > 0.97) return "Nouvelle Lune";
  if(frac < 0.22) return "Premier croissant";
  if(frac < 0.28) return "Premier quartier";
  if(frac < 0.47) return "Gibbeuse croissante";
  if(frac < 0.53) return "Pleine Lune";
  if(frac < 0.72) return "Gibbeuse décroissante";
  if(frac < 0.78) return "Dernier quartier";
  return "Dernier croissant";
}

/* ---------- Formatting helpers ---------- */
const MONTHS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const DOW_FR = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
function formatStripeLabel(d){ return `${MONTHS[d.getMonth()].toUpperCase()} ${d.getFullYear()}` }
function formatStripeDateMain(d){ return String(d.getDate()).padStart(2,"0") }
function formatStripeDateSub(d){ return `${DOW_FR[d.getDay()].toUpperCase()} · ${String(d.getDate()).padStart(2,"0")} / ${String(d.getMonth()+1).padStart(2,"0")} / ${d.getFullYear()}` }
function formatDowShort(d){ return ["Thu","Fri","Sat","Sun","Mon","Tue","Wed"][d.getDay()] || ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()] }

/* ---------- Build the UI (8-day diagonal timeline centered on today) ---------- */
(function build(){
  const now = new Date();
  const today = startOfDay(now);

  const banner = document.getElementById("p3p-banner");
  const bannerMain = document.getElementById("p3p-banner-main");
  const bannerSub = document.getElementById("p3p-banner-sub");
  const stripeLabel = document.getElementById("p3p-stripe-label");
  const dateMain = document.getElementById("p3p-date-main");
  const dateSub = document.getElementById("p3p-date-sub");
  const timeline = document.getElementById("p3p-timeline");
  const moonText = document.getElementById("p3p-moon-text");
  const bottomText = document.getElementById("p3p-bottom-text");

  // Top stripe values
  stripeLabel.textContent = formatStripeLabel(today);
  dateMain.textContent = formatStripeDateMain(today);
  dateSub.textContent = formatStripeDateSub(today);

  // Holiday banner logic
  const holiday = getFrenchHoliday(today);
  const isWeekend = today.getDay() === 0 || today.getDay() === 6;
  if(holiday || isWeekend){
    banner.style.display = "inline-flex";
    bannerMain.textContent = "DAY OFF";
    bannerSub.textContent = (holiday ? holiday : "Week-end").toUpperCase();
  } else {
    banner.style.display = "none";
  }

  // Build 8-day timeline: 3 days before, today, 4 days after
  const startOffset = -3;
  const total = 8;
  timeline.innerHTML = "";
  for(let i=0;i<total;i++){
    const offset = startOffset + i;
    const d = addDays(today, offset);
    const isToday = isSameDay(d,today);
    const frac = moonPhaseFraction(new Date(d.getFullYear(),d.getMonth(),d.getDate(),12,0,0)); // midday for stability
    const phaseName = moonPhaseName(frac);

    const day = document.createElement("div");
    day.className = "p3p-day" + (isToday ? " current" : "");
    day.setAttribute("role","button");
    day.setAttribute("aria-label", `${DOW_FR[d.getDay()]} ${d.getDate()} - ${phaseName}`);
    day.title = `${DOW_FR[d.getDay()]} ${d.getDate()} · ${phaseName}`;

    const inner = document.createElement("div");
    inner.className = "p3p-day-inner";

    const dow = document.createElement("div");
    dow.className = "p3p-dow";
    dow.textContent = DOW_FR[d.getDay()].toUpperCase();

    const num = document.createElement("div");
    num.className = "p3p-num";
    num.textContent = d.getDate();

    const moonWrap = document.createElement("div");
    moonWrap.style.marginTop = "2px";
    const moon = document.createElement("div");
    moon.className = "p3p-moon";
    // set CSS variable for mask transform (0..1)
    moon.style.setProperty("--phase", frac.toFixed(4));
    moonWrap.appendChild(moon);

    inner.appendChild(dow);
    inner.appendChild(num);
    inner.appendChild(moonWrap);
    day.appendChild(inner);
    timeline.appendChild(day);

    if(isToday){
      moonText.textContent = phaseName.toUpperCase();
      bottomText.textContent = "AUJOURD'HUI";
    }
  }

  // Accessibility: allow keyboard focus on days
  Array.from(timeline.querySelectorAll(".p3p-day")).forEach(el=>{
    el.tabIndex = 0;
    el.addEventListener("keydown", e=>{
      if(e.key === "Enter" || e.key === " ") el.click();
    });
  });

  // Auto-update at midnight local time so it "updates itself every day"
  scheduleMidnightUpdate();
})();

/* ---------- Auto refresh at next midnight to update the calendar automatically ---------- */
function scheduleMidnightUpdate(){
  const now = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 0, 0, 5); // 5s after midnight
  const ms = next - now;
  setTimeout(()=>{ location.reload(); }, ms);
}

/* ---------- Notes on moon rendering:
   - The moon uses a dark mask pseudo-element that is translated horizontally based on --phase.
   - CSS transform is driven by the JS-calculated --phase variable (0..1).
   - Current day gets a yellow moon and animated targeting ring.
*/
</script>
</body>
</html>
